# fly.toml app configuration file generated for reputation-snapshot on 2026-04-20T19:16:43+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'reputation-snapshot'
primary_region = 'nrt'

[build]

[env]
  APP_HOST = '0.0.0.0'
  APP_PORT = '5000'
  DB_PATH = '/data/app.db'
  ENV = 'production'

[[mounts]]
  source = 'app_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
