name: tests

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-tests:
    name: Offline test suite
    runs-on: ubuntu-latest
    env:
      # Live Playwright capture tests hit real marketplace pages. They are
      # off by default (see tests/test_live_capture.py) and doubly excluded
      # here by both the env flag and the pytest marker — CI must never hit
      # Mercari.
      RUN_LIVE_CAPTURE_TESTS: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Byte-compile source tree (syntax gate)
        run: python -m compileall -q .

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run offline test suite
        run: python -m pytest -q -rs -m "not live_capture"
