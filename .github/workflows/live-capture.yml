name: live-capture

# Opt-in live Mercari capture lane. This is the ONLY workflow that drives a
# real browser against jp.mercari.com, so it is deliberately kept off the
# PR/push path: it runs only on manual dispatch or the scheduled cron below.
# The lane is bounded (navigation count + wall-clock deadline via
# utils/live_capture_guard.RequestBudget) and aborts on rate-limit / bot-wall
# signals, so a run can neither fan out nor hang.
on:
  workflow_dispatch:
    inputs:
      max_requests:
        description: "Max browser navigations for the whole batch"
        required: false
        default: "20"
      deadline_seconds:
        description: "Overall wall-clock deadline for the batch (seconds)"
        required: false
        default: "300"
  schedule:
    # Weekly, Monday 03:00 UTC — a low-traffic slot to catch source layout drift.
    - cron: "0 3 * * 1"

# Never run two live batches at once against Mercari.
concurrency:
  group: live-capture
  cancel-in-progress: false

jobs:
  live-capture:
    name: Live Mercari capture (opt-in)
    runs-on: ubuntu-latest
    # Hard ceiling on the job itself, on top of the in-process RequestBudget
    # deadline, so a hung browser can never keep the runner alive.
    timeout-minutes: 15
    env:
      RUN_LIVE_CAPTURE_TESTS: "1"
      # Conservative defaults for the scheduled cron; workflow_dispatch inputs
      # override them when a human triggers a run.
      LIVE_CAPTURE_MAX_PROFILES: "2"
      LIVE_CAPTURE_MAX_ITEMS: "2"
      LIVE_CAPTURE_MAX_REQUESTS: ${{ github.event.inputs.max_requests || '20' }}
      LIVE_CAPTURE_DEADLINE_SECONDS: ${{ github.event.inputs.deadline_seconds || '300' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run live capture suite
        run: |
          python -m pytest -q -rs -m live_capture \
            --junitxml=live-capture-results.xml 2>&1 | tee live-capture.log

      - name: Upload live capture log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-capture-log
          # The structured log carries only source URL / stage / elapsed /
          # failure class (no page content), so it is safe to keep as an
          # artifact (see utils/live_capture_guard.log_live_event).
          path: |
            live-capture.log
            live-capture-results.xml
          if-no-files-found: warn
