<!DOCTYPE html>
<html lang="{{ t.lang_html }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t.app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="lang-switcher">
    <a href="/lang/zh" class="lang-btn{{ ' active' if lang == 'zh' }}" title="中文">🇹🇼</a>
    <a href="/lang/en" class="lang-btn{{ ' active' if lang == 'en' }}" title="English">🇬🇧</a>
    <a href="/lang/ja" class="lang-btn{{ ' active' if lang == 'ja' }}" title="日本語">🇯🇵</a>
  </nav>

  <main class="shell">
    <section class="panel hero home-hero">
      <div class="hero-copy">
        <p class="eyebrow">{{ t.third_party_label }}</p>
        <h1>{{ t.app_name }}</h1>
        <p class="lead">{{ t.hero_lead }}</p>
      </div>

      <form id="capture-form" class="capture-form">
        <label for="query_url">{{ t.input_label }}</label>
        <p class="input-note">{{ t.input_note }}</p>

        <div class="capture-form-row">
          <input
            id="query_url"
            name="query_url"
            type="url"
            placeholder="https://jp.mercari.com/item/m74005892833"
            value="{{ demo_url }}"
            required
          >
          <button type="submit">{{ t.submit_button }}</button>
        </div>

        <p class="form-hint">{{ t.form_hint }}</p>
      </form>
    </section>

    <section class="panel result-panel">
      <div class="result-head">
        <div>
          <p class="eyebrow">{{ t.lookup_status_label }}</p>
          <h2 id="lookup-heading">{{ t.lookup_status_label }}</h2>
        </div>
        <span id="status-badge" class="status-badge idle">{{ t.status_idle }}</span>
      </div>

      <p id="result-message" class="result-message" aria-live="polite">{{ t.idle_message }}</p>
      <div id="result-actions" class="result-actions"></div>
      <pre id="result-json" class="result-json" hidden></pre>
    </section>
  </main>

  <script>
    window._i18n = {{ t | tojson }};
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
